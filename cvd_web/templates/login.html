<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{app_name}} - вход</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-page" data-theme="{{default_theme}}">
  <div class="emoji-layer" aria-hidden="true">
    <span>🫀</span><span>🩺</span><span>💊</span><span>💉</span><span>🧬</span>
    <span>🧪</span><span>🩹</span><span>🩻</span><span>⚕️</span><span>🩸</span>
    <span>🧫</span><span>🌡️</span><span>🧠</span><span>🫁</span><span>🦷</span>
    <span>👩‍⚕️</span><span>👨‍⚕️</span><span>🏥</span><span>🚑</span><span>🧑‍⚕️</span>
  </div>
  <main class="auth-card">
    <div class="auth-card-head">
      <div>
        <h1>{{app_name}}</h1>
      </div>
      <button type="button" data-theme-toggle>Тема</button>
    </div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div class="toolbar" style="margin-top: 14px;">
        <button class="primary" type="submit">Войти</button>
      </div>
      <p id="loginError" class="muted" role="alert"></p>
    </form>
  </main>
  <script>window.APP_SETTINGS = {{settings_json}};</script>
  <script src="/static/js/theme.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const error = document.getElementById("loginError");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      const button = form.querySelector("button");
      button.disabled = true;
      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: form.email.value,
            password: form.password.value
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Ошибка входа");
        window.location.href = data.redirect || "/app";
      } catch (err) {
        error.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
